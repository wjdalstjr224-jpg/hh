<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚠️ SYSTEM_MALFUNCTION_DEATH_ZONE ⚠️</title>
<style>
:root {
  --meat-red: #2b0000;
  --pure-blood: #ff0000;
  --rot-black: #020202;
  --bone-white: #e0d7d7;
}

body {
  margin: 0;
  font-family: 'Courier New', monospace;
  background-color: var(--rot-black);
  color: var(--bone-white);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  position: relative;
  cursor: crosshair;
}

/* 핏빛 안개와 불쾌한 어둠 */
body::before {
  content: "";
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: 
    radial-gradient(circle at center, transparent 10%, rgba(0,0,0,0.98) 70%),
    linear-gradient(rgba(18, 0, 0, 0.4), rgba(0, 0, 0, 0.9));
  pointer-events: none;
  z-index: 5;
}

/* 비디오 노이즈 효과 */
.vhs-glitch {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: repeating-linear-gradient(
    0deg,
    rgba(255, 0, 0, 0.03) 0px,
    rgba(255, 0, 0, 0.03) 2px,
    transparent 2px,
    transparent 4px
  );
  pointer-events: none;
  z-index: 6;
  animation: vhs 0.05s infinite;
}

@keyframes vhs {
  0% { transform: translateY(0.5px); filter: contrast(120%); }
  100% { transform: translateY(-0.5px); filter: contrast(150%); }
}

/* 마우스 잔상 피 효과 레이어 */
.blood-canvas {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
  z-index: 1;
}

.blood-drop {
  position: absolute;
  width: 30px; height: 30px;
  background: var(--pure-blood);
  border-radius: 50%;
  filter: blur(15px);
  opacity: 0.7;
  pointer-events: none;
  transform: translate(-50%, -50%);
  animation: fadeOutBlood 1.5s forwards;
}

@keyframes fadeOutBlood {
  0% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
  100% { transform: translate(-50%, -50%) scale(3); opacity: 0; }
}

/* ★ 하드코어 갑툭튀(점프스케어) 레이어 */
#jumpscareOverlay {
  position: fixed;
  top: 0; left: 0; width: 100vw; height: 100vh;
  background-color: #000;
  z-index: 999;
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.05s ease-in;
}

/* CSS로 구현한 기괴하게 일그러진 붉은 얼굴 형상 */
.scary-face {
  width: 300px;
  height: 400px;
  background: radial-gradient(ellipse at center, #ff0000 0%, #3a0000 70%, transparent 100%);
  border-radius: 40% 40% 50% 50%;
  position: relative;
  filter: blur(4px) contrast(200%);
  animation: faceTwist 0.1s infinite alternate;
}

.scary-face .eye-hole {
  position: absolute;
  top: 35%;
  width: 60px; height: 80px;
  background: #000;
  border-radius: 50%;
  box-shadow: 0 0 20px #ff0000;
}
.scary-face .eye-hole.left { left: 20%; }
.scary-face .eye-hole.right { right: 20%; }

.scary-face .mouth-hole {
  position: absolute;
  bottom: 15%; left: 25%;
  width: 50%; height: 120px;
  background: #000;
  border-radius: 40% 40% 60% 60%;
  box-shadow: 0 0 30px #ff0000;
}

@keyframes faceTwist {
  0% { transform: scale(1) rotate(2deg) skewX(5deg); }
  100% { transform: scale(1.3) rotate(-3deg) skewY(-5deg); filter: invert(0.1) blur(2px); }
}

/* 메인 게임 프레임 */
.game {
  width: 440px;
  padding: 40px 30px;
  background: #000;
  border: 2px solid #110000;
  box-shadow: 0 0 100px rgba(255, 0, 0, 0.3);
  z-index: 10;
  position: relative;
}

.hardcore-glitch {
  animation: fleshRupture 0.1s infinite;
}

@keyframes fleshRupture {
  0% { transform: translate(15px, -15px); filter: invert(1); }
  50% { transform: translate(-15px, 15px) scale(0.95); }
  100% { transform: translate(0, 0); }
}

.top {
  display: flex;
  justify-content: space-between;
  margin-bottom: 30px;
  font-size: 11px;
  letter-spacing: 3px;
  color: #444;
}

.timer {
  color: var(--pure-blood);
  font-weight: bold;
}

.question-container {
  background: #000;
  border-bottom: 3px dashed var(--meat-red);
  padding: 40px 0;
  margin-bottom: 35px;
  text-align: center;
}

.question {
  font-size: 22px;
  font-weight: bold;
  color: #776e6e;
  letter-spacing: -1px;
}

.choices {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}

button {
  padding: 16px;
  font-size: 15px;
  font-family: monospace;
  background: #000;
  border: 1px dashed #222;
  color: #555;
  cursor: pointer;
  text-align: left;
  padding-left: 20px;
}

button:hover {
  background: #050000;
  color: var(--pure-blood);
  border-color: var(--pure-blood);
}

.correct {
  background: #051505 !important;
  color: #00ff33 !important;
  border: 1px solid #00ff33 !important;
}

.wrong {
  background: #2b0000 !important;
  color: var(--pure-blood) !important;
  border: 1px solid var(--pure-blood) !important;
}

.bottom {
  margin-top: 30px;
  font-size: 11px;
  color: #333;
}

.start-screen, .end-screen {
  text-align: center;
}

h1 {
  font-size: 20px;
  color: var(--pure-blood);
  margin: 0 0 40px 0;
  letter-spacing: 5px;
}

.hidden {
  display: none !important;
}

.big-btn {
  padding: 15px 50px;
  font-size: 13px;
  background: #110000;
  color: #777;
  border: 1px solid #333;
  cursor: pointer;
}

.big-btn:hover {
  background: var(--pure-blood);
  color: #000;
  font-weight: bold;
}
</style>
</head>
<body>

<div class="vhs-glitch"></div>
<div class="blood-canvas" id="bloodLayer"></div>

<div id="jumpscareOverlay">
  <div class="scary-face">
    <div class="eye-hole left"></div>
    <div class="eye-hole right"></div>
    <div class="mouth-hole"></div>
  </div>
</div>

<div class="game" id="gameWindow">

  <div class="start-screen" id="startScreen">
    <h1>[ 뇌부정 유발 개체 ]</h1>
    <p style="color:#555; font-size:12px; margin-bottom:30px;">⚠️ 경고: 오답 시 심약자 충격 유발 장치 가동</p>
    <button class="big-btn" onclick="initAudio(); startGame();">정신 격리 개시</button>
  </div>

  <div class="play-screen hidden" id="playScreen">
    <div class="top">
      <div class="timer">LIMIT: <span id="time">30</span>s</div>
      <div>RECORDING...</div>
    </div>

    <div class="question-container">
      <div class="question" id="question">정신 오염 분석 중</div>
    </div>

    <div class="choices" id="choices"></div>

    <div class="bottom">
      <div>COUNT: <span id="score">0</span></div>
    </div>
  </div>

  <div class="end-screen hidden" id="endScreen">
    <h1 style="color:#fff;">[ 영구 격리 패배 ]</h1>
    <p style="color:var(--pure-blood); font-size:12px; letter-spacing: 2px;">되돌릴 수 없는 오염 수치: <span id="finalScore">0</span></p>
    <button class="big-btn" onclick="location.reload()" style="margin-top: 30px;">영구 재시도</button>
  </div>

</div>

<script>
let score = 0;
let time = 30;
let correctAnswer;
let timer;
let audioCtx;

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

// 오답 시 고주파 비명 소리를 합성하는 강력한 크리처 노이즈 엔진
function playScreamSound() {
  if(!audioCtx) return;
  
  // 메인 비명용 톱니파
  let osc1 = audioCtx.createOscillator();
  let osc2 = audioCtx.createOscillator();
  let gain = audioCtx.createGain();
  
  osc1.type = 'sawtooth';
  osc1.frequency.setValueAtTime(300, audioCtx.currentTime);
  osc1.frequency.linearRampToValueAtTime(900, audioCtx.currentTime + 0.1);
  osc1.frequency.linearRampToValueAtTime(150, audioCtx.currentTime + 0.6);
  
  // 불협화음을 유발하는 모듈레이터
  osc2.type = 'square';
  osc2.frequency.setValueAtTime(280, audioCtx.currentTime);
  osc2.frequency.linearRampToValueAtTime(950, audioCtx.currentTime + 0.15);
  
  gain.gain.setValueAtTime(0.6, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.7);
  
  osc1.connect(gain);
  osc2.connect(gain);
  gain.connect(audioCtx.destination);
  
  osc1.start();
  osc2.start();
  osc1.stop(audioCtx.currentTime + 0.7);
  osc2.stop(audioCtx.currentTime + 0.7);
}

// 마우스 피 효과
document.addEventListener('mousemove', (e) => {
  const layer = document.getElementById('bloodLayer');
  const drop = document.createElement('div');
  drop.classList.add('blood-drop');
  drop.style.left = e.clientX + 'px';
  drop.style.top = e.clientY + 'px';
  layer.appendChild(drop);
  setTimeout(() => drop.remove(), 1500);
});

function startGame() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('playScreen').classList.remove('hidden');
  nextQuestion();
  timer = setInterval(() => {
    time--;
    document.getElementById('time').textContent = time;
    if (time <= 0) endGame();
  }, 1000);
}

function nextQuestion() {
  let pattern = Math.floor(Math.random() * 4);
  let rawFormula = "";

  switch(pattern) {
    case 0: 
      let base = 2;
      let ansX = Math.floor(Math.random() * 3) + 2; 
      let k = Math.pow(base, ansX + 1) - 8;
      correctAnswer = ansX;
      rawFormula = `방정식 2^(x+1) - 8 = ${k} 의 실근 x = ?`;
      break;
    case 1: 
      let nCoef = Math.floor(Math.random() * 5) + 3; 
      correctAnswer = nCoef;
      rawFormula = `lim(n→∞) (${nCoef}n^2 - n) / (n^2 + 99) = ?`;
      break;
    case 2: 
      let a = Math.floor(Math.random() * 2) + 3; 
      correctAnswer = 2 * a * 2;
      rawFormula = `f(x) = ${a}x^2 일 때, 순간변화율 f'(2) = ?`;
      break;
    case 3: 
      let kVal = Math.floor(Math.random() * 2) + 2; 
      correctAnswer = Math.pow(kVal, 3);
      rawFormula = `정적분 ∫[0→${kVal}] 3x^2 dx 의 계산값 = ?`;
      break;
  }

  document.getElementById('question').textContent = rawFormula;

  let answers = [correctAnswer];
  while (answers.length < 4) {
    let offset = (Math.random() > 0.5 ? 1 : -1) * (Math.floor(Math.random() * 2) + 1);
    let wrong = correctAnswer + offset;
    if (!answers.includes(wrong) && wrong >= 0) answers.push(wrong);
  }

  answers.sort(() => Math.random() - 0.5);
  let choicesDiv = document.getElementById('choices');
  choicesDiv.innerHTML = '';

  answers.forEach(ans => {
    let btn = document.createElement('button');
    btn.textContent = `> INPUT: ${ans}`;
    btn.onclick = () => checkAnswer(btn, ans);
    choicesDiv.appendChild(btn);
  });
}

function checkAnswer(button, answer) {
  let gameWindow = document.getElementById('gameWindow');
  let jumpscare = document.getElementById('jumpscareOverlay');
  let buttons = document.querySelectorAll('.choices button');
  buttons.forEach(b => b.style.pointerEvents = 'none');

  if (answer === correctAnswer) {
    score += 10;
    button.classList.add('correct');
    setTimeout(() => { nextQuestion(); }, 400);
  } else {
    button.classList.add('wrong');
    
    // 1. 비명 소리 재생
    playScreamSound(); 
    
    // 2. 갑툭튀 레이어 전면 노출 및 발작 효과
    jumpscare.style.opacity = '1';
    gameWindow.classList.add('hardcore-glitch');
    
    // 0.6초간 공포 상태 유지 후 복구
    setTimeout(() => {
      jumpscare.style.opacity = '0';
      gameWindow.classList.remove('hardcore-glitch');
      nextQuestion();
    }, 600);
  }

  document.getElementById('score').textContent = score;
}

function endGame() {
  clearInterval(timer);
  document.getElementById('playScreen').classList.add('hidden');
  document.getElementById('endScreen').classList.remove('hidden');
  document.getElementById('finalScore').textContent = score;
}
</script>

</body>
</html>
